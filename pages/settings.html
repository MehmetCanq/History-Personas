<div class="settings-container">

    <h1>Ayarlar</h1>

<div class="auth-container">
    <h2>Ayarlar</h2>
    <div class="form-group">
        <label>Görünüm Modu</label>
       <button class="auth-btn" onclick="document.body.classList.toggle('dark-theme')">Koyu Tema</button>
        <button class="auth-btn" onclick="document.body.classList.toggle('light-theme')">Açık Tema</button>
        <button class="auth-btn" onclick="document.body.classList.toggle('system-theme')">Sistem Tema</button>
    </div>
    <div class="form-group">
        <label>Dil</label>
        <button class="auth-btn" onclick="setLanguage('tr')">tr</button>
        <button class="auth-btn" onclick="setLanguage('en')">en</button>
    </div>
</div>
</div>
