<div class="settings-container">
    <h1 data-i18n="settings_title">Ayarlar</h1>

    <div class="settings-card">
        <h3 data-i18n="appearance_mode">Görünüm Modu</h3>
        <div class="theme-picker">
            <button class="theme-btn" data-theme-btn="dark" onclick="setTheme('dark')" data-i18n="theme_dark">
                Koyu
            </button>
            <button class="theme-btn" data-theme-btn="light" onclick="setTheme('light')" data-i18n="theme_light">
                Açık
            </button>
            <button class="theme-btn" data-theme-btn="system" onclick="setTheme('system')" data-i18n="theme_system">
                Sistem
            </button>
        </div>
    </div>

    <div class="settings-card">
        <h3 data-i18n="language_title">Dil</h3>
        <div class="lang-picker">
            <button class="lang-btn" data-lang="tr" onclick="setLanguage('tr')" data-i18n="lang_tr">Türkçe</button>
            <button class="lang-btn" data-lang="en" onclick="setLanguage('en')" data-i18n="lang_en">English</button>
        </div>
    </div>

</div>
