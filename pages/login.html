<div class="auth-container" style="max-width: 400px; margin: 50px auto; padding: 20px; border: 1px solid #ccc; border-radius: 8px;">
    <h2>Giriş Yap</h2>
    <form id="login-form">
        <div style="margin-bottom: 10px;">
            <input type="email" id="login-email" placeholder="E-posta" required style="width: 100%; padding: 8px;">
        </div>
        <div style="margin-bottom: 15px;">
            <input type="password" id="login-sifre" placeholder="Şifre" required style="width: 100%; padding: 8px;">
        </div>
        <button type="submit" style="width: 100%; padding: 10px; background: #333; color: white; border: none; cursor: pointer;">Giriş Yap</button>
    </form>
    <p id="login-mesaj" style="color: red; margin-top: 10px; font-size: 14px;"></p>
</div>
