<div class="auth-container">
    <h2 data-i18n="login_title">Giriş Yap</h2>
    <form id="login-form">
        <div class="form-group">
            <input type="email" id="login-email" class="auth-input" data-i18n-attr="placeholder:login_email_placeholder" placeholder="E-posta" required>
        </div>
        <div class="form-group">
            <input type="password" id="login-sifre" class="auth-input" data-i18n-attr="placeholder:login_password_placeholder" placeholder="Şifre" required>
        </div>
        <button type="submit" class="auth-btn" data-i18n="login_title">Giriş Yap</button>
    </form>
    <p id="login-mesaj"></p>
</div>
