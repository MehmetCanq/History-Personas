<div class="auth-container">
    <h2>Giriş Yap</h2>
    <form id="login-form">
        <div class="form-group">
            <input type="email" id="login-email" class="auth-input" placeholder="E-posta" required>
        </div>
        <div class="form-group">
            <input type="password" id="login-sifre" class="auth-input" placeholder="Şifre" required>
        </div>
        <button type="submit" class="auth-btn">Giriş Yap</button>
    </form>
    <p id="login-mesaj"></p>
</div>
