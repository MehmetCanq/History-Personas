<div class="auth-container">
    <h2>Kayıt Ol</h2>
    <form id="register-form">
        <div class="form-group">
            <input type="text" id="reg-isim" class="auth-input" placeholder="İsim" required>
        </div>
        <div class="form-group">
            <input type="text" id="reg-soyisim" class="auth-input" placeholder="Soyisim" required>
        </div>
        <div class="form-group">
            <input type="email" id="reg-email" class="auth-input" placeholder="E-posta Adresi" required>
        </div>
        <div class="form-group">
            <input type="password" id="reg-sifre" class="auth-input" placeholder="Şifre" required>
        </div>
        <div class="form-group">
            <label>Profil Fotoğrafı</label>
            <input type="file" id="reg-profil-foto" accept="image/*" class="auth-input">
        </div>
        <button type="submit" class="auth-btn">Kayıt İşlemini Tamamla</button>
    </form>
    <p id="reg-mesaj"></p>
</div>
